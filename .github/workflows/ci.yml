name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.7.4
      - run: ruff check server

  lint-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome_extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run lint

  test-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Android/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run test:crypto
